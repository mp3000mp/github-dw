- name: Deploy directories
  synchronize:
    delete: true
    src: '{{ playbook_dir }}/../../backend/{{ item }}'
    dest: "{{ app_directory }}/backend/"
    recursive: true
    rsync_opts:
      - "--chown={{ maintainer_user }}:{{ maintainer_user }}"
      - '--chmod=0755'
  loop:
    - 'bin'
    - 'config'
    - 'migrations'
    - 'public'
    - 'resources'
    - 'src'
    - 'templates'
    - 'translations'
    - 'vendor'

- name: Remove files
  file:
    state: absent
    path: "{{ app_directory }}/backend/{{ item }}"
  loop:
    - 'bin/phpunit'

- name: Deploy files
  copy:
    src: '{{ playbook_dir }}/../../backend/{{ item }}'
    dest: "{{ app_directory }}/backend/"
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '755'
  loop:
    - '.env'
    - 'composer.json'
    - 'composer.lock'
    - 'symfony.lock'

- name: Create .env.local
  template:
    src: templates/.env.j2
    dest: "/{{ app_directory }}/backend/.env.local"
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '755'

- name: Create directories system
  file:
    path: "{{ app_directory }}/backend/{{ item }}"
    state: directory
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '755'
    recurse: true
  loop:
    - 'var'

# todo 777 horrible
- name: Create directories writable
  file:
    path: "{{ app_directory }}/backend/{{ item }}"
    state: directory
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '777'
    recurse: true
  loop:
    - 'var/log'
    - 'var/cache'

# not needed because we sync vendor for now
#- name: Composer install
#  shell:
#    cmd: docker-compose exec backend bash -l -c "composer install"
#    chdir: "{{ app_directory }}/docker"

- name: Composer cache clear
  shell:
    cmd: docker-compose exec backend bash -l -c "php bin/console cache:clear"
    chdir: "{{ app_directory }}/docker"

# todo access denied on volume ?
- name: Composer migration
  shell:
    cmd: docker-compose exec backend bash -l -c "php bin/console doctrine:migration:migrate --no-interaction"
    chdir: "{{ app_directory }}/docker"

