- name: Create directories
  become: true
  become_user: root
  file:
    path: "{{ app_directory }}{{ item }}"
    state: directory
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '755'
    recurse: true
  loop:
    - ''
    - '/dw'
    - '/frontend'
    - '/backend'
    - '/docker'
