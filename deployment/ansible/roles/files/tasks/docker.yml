

- name: Deploy directories
  synchronize:
    delete: true
    src: '{{ playbook_dir }}/../docker/{{ item }}'
    dest: "{{ app_directory }}/docker/"
    recursive: true
    rsync_opts:
      - "--chown={{ maintainer_user }}:{{ maintainer_user }}"
      - '--chmod=0755'
      - '--exclude=db'
  loop:
    - 'backend'
    - 'mariadb'
