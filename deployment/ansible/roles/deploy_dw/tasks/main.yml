- name: Create dw .env
  template:
    src: templates/.env.j2
    dest: "{{ app_directory }}/dw/.env"
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '640'

- name: Create dw directories
  file:
    path: "{{ app_directory }}/dw/{{ item }}"
    state: directory
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '750'
  loop:
    - 'log'

- name: Deploy dw build
  copy:
    src: '{{ playbook_dir }}/../../dw/bin/main'
    dest: '{{ app_directory }}/dw/main'
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '740'

- name: Remove obsolete dw restart cronjob
  ansible.builtin.cron:
    name: "Restart ghf dw container"
    state: absent
    user: "{{ maintainer_user }}"

- name: Remove obsolete dw restart script
  ansible.builtin.file:
    path: "{{ app_directory }}/docker/restart.sh"
    state: absent
