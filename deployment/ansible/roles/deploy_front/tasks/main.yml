- name: Create directories
  file:
    path: "{{ app_directory }}/frontend/{{ item }}"
    state: directory
    owner: "{{ maintainer_user }}"
    group: "{{ maintainer_user }}"
    mode: '644'
  loop:
    - 'dist'
    - 'log'

