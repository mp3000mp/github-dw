- name: Deploy directories
  synchronize:
    delete: true
    src: '{{ playbook_dir }}/../../frontend/{{ item }}'
    dest: "{{ app_directory }}/frontend/"
    recursive: true
    rsync_opts:
      - "--chown={{ maintainer_user }}:{{ maintainer_user }}"
      - '--chmod=0755'
  loop:
    - 'dist'
