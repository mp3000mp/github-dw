version: '3'

# caution: this config is for DEV use only

services:
  mariadb:
    image: mariadb:10.6
    user: "1000:1000"
    environment:
      MYSQL_ROOT_PASSWORD: "$MYSQL_ROOT_PASSWORD"
      MYSQL_DATABASE: "$MYSQL_DATABASE"
      MYSQL_USER: "$MYSQL_USER"
      MYSQL_PASSWORD: "$MYSQL_PASSWORD"
    volumes:
      - ./mariadb/db:/var/lib/mysql
      - ./mariadb/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mariadb/log:/var/log/mysql

  mariadb_test:
    image: mariadb:10.6
    user: "1000:1000"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: github_finder_test
      MYSQL_USER: user1
      MYSQL_PASSWORD: password1
    volumes:
      - ./mariadb_test/db:/var/lib/mysql
      - ./mariadb_test/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./mariadb_test/log:/var/log/mysql

  # Usage: docker-compose run --rm dw go run main.go
  #        docker-compose run --rm dw go run main.go migrate
  dw:
    image: golang:1.18
    working_dir: /usr/src/app
    env_file: ../../dw/.env
    volumes:
      - ../../dw:/usr/src/app
    depends_on:
      - mariadb

  # Usage: docker-compose run --rm dw_test
  dw_test:
    image: golang:1.18
    command: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
    working_dir: /usr/src/app
    volumes:
      - ../../dw:/usr/src/app

  # Usage: docker-compose run --rm dw_lint
  dw_lint:
    image: golangci/golangci-lint:v1.64.8
    command: golangci-lint run
    working_dir: /usr/src/app
    volumes:
      - ../../dw:/usr/src/app

  backend:
    build: backend
    ports:
      - "5000:80"
    volumes:
      - ../../backend:/var/www/html
      - ./backend/sites-enabled:/etc/apache2/sites-enabled
      - ./backend/conf.d/php.ini:/usr/local/etc/php/conf.d/php.ini
    depends_on:
      - mariadb

  adminer:
    image: adminer
    user: "1000:1000"
    ports:
      - '5001:8080'
    depends_on:
      - mariadb
      - mariadb_test
