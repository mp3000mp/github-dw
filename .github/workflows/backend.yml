name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest

    env:
      DIRECTORY: ./backend
      DB_USER: user1
      DB_PASSWORD: password1
      DB_NAME: github_finder_test

    steps:
      - name: Start MariaDB
        run: |
          docker run -d --name mariadb_test \
            -e MARIADB_ROOT_PASSWORD=secret \
            -e MARIADB_USER=${{ env.DB_USER }} \
            -e MARIADB_PASSWORD=${{ env.DB_PASSWORD }} \
            -e MARIADB_DATABASE=${{ env.DB_NAME }} \
            -p 3306:3306 \
            mariadb:11.4 \
            --innodb-use-native-aio=0
          echo "127.0.0.1 mariadb_test" | sudo tee -a /etc/hosts
          until docker exec mariadb_test mariadb-admin ping --silent; do sleep 2; done

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, mbstring, intl, pdo_sqlite, mysql
          tools: composer:v2
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        working-directory: ${{ env.DIRECTORY }}
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: PHP cs fixer
        working-directory: ${{ env.DIRECTORY }}
        run: composer csd

      - name: Warmup Symfony cache
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console cache:warmup --env=dev

      - name: PHPStan
        working-directory: ${{ env.DIRECTORY }}
        run: composer ps

      - name: Create database
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console doc:database:create --if-not-exists --no-interaction -e test
        env:
          DATABASE_URL: mysql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@mariadb_test:3306/${{ env.DB_NAME }}?serverVersion=mariadb-11.4.0

      - name: Apply dw SQL migrations
        run: |
          for f in dw/model/migrations/*.sql; do
            docker exec -i \
              -e MYSQL_PWD=${{ env.DB_PASSWORD }} \
              mariadb_test \
              mariadb -u ${{ env.DB_USER }} ${{ env.DB_NAME }} < "$f"
          done

      - name: Migrate database
        working-directory: ${{ env.DIRECTORY }}
        run: php bin/console doc:mig:mig --no-interaction -e test
        env:
          DATABASE_URL: mysql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@mariadb_test:3306/${{ env.DB_NAME }}?serverVersion=mariadb-11.4.0

      - name: Exec tests
        working-directory: ${{ env.DIRECTORY }}
        run: composer tuci
        env:
          DATABASE_URL: mysql://${{ env.DB_USER }}:${{ env.DB_PASSWORD }}@mariadb_test:3306/${{ env.DB_NAME }}?serverVersion=mariadb-11.4.0

